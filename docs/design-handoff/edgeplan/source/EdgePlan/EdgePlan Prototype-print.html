<!doctype html>
<html lang="pt-PT" data-theme="light">
<head>
  <meta charset="utf-8"/>
  <title>EdgePlan — Print</title>
  <link rel="stylesheet" href="colors_and_type.css"/>
  <link rel="stylesheet" href="app.css"/>
  <style>
    /* ---- Print page layout ---- */
    @page { size: 1280px 1700px; margin: 0; }

    html, body {
      background: var(--bg-app);
      margin: 0;
      padding: 0;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    #root { display: block; }

    .print-page {
      width: 1280px;
      min-height: 1700px;
      background: var(--bg-app);
      break-after: page;
      page-break-after: always;
      position: relative;
      overflow: hidden;
    }
    .print-page:last-child { break-after: auto; page-break-after: auto; }

    .print-page-label {
      position: absolute;
      top: 12px; right: 16px;
      font: var(--t-eyebrow);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--fg-3);
      z-index: 50;
      pointer-events: none;
    }

    /* The shell already fills its container; constrain it to one page height */
    .print-page .app-shell {
      height: 1700px;
      min-height: 0;
    }

    /* keep main content from clipping internal scroll: spread it instead */
    .print-page .main {
      overflow: visible !important;
      height: auto !important;
    }
    .print-page .sidebar { height: 1700px; }

    /* No animations / transitions in print */
    * {
      animation: none !important;
      transition: none !important;
    }

    @media print {
      body { background: #fff; }
      .print-page { box-shadow: none; }
    }

    /* On screen, give pages a visible separator + center them */
    @media screen {
      body { padding: 24px; background: #1a1a1a; }
      .print-page {
        margin: 0 auto 32px;
        box-shadow: 0 8px 32px rgba(0,0,0,.4);
      }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="Today.jsx"></script>
  <script type="text/babel" src="Weekly.jsx"></script>
  <script type="text/babel" src="Monthly.jsx"></script>
  <script type="text/babel" src="Sessions.jsx"></script>
  <script type="text/babel" src="ActiveSession.jsx"></script>
  <script type="text/babel" src="Study.jsx"></script>
  <script type="text/babel" src="WeeklyReview.jsx"></script>
  <script type="text/babel" src="Coach.jsx"></script>
  <script type="text/babel" src="Settings.jsx"></script>
  <script type="text/babel" src="app-print.jsx"></script>
  <script type="text/babel">
    // Auto-print once Babel/JSX has compiled, fonts are loaded, and React has mounted.
    (async () => {
      if (document.fonts && document.fonts.ready) {
        try { await document.fonts.ready; } catch (e) {}
      }
      // Wait for React to finish initial render
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
      await new Promise(r => setTimeout(r, 500));
      window.print();
    })();
  </script>
</body>
</html>
